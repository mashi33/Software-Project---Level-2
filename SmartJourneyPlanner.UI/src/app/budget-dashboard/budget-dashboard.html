<div class="main-container background-container">
  <div class="content-wrapper">
    <div class="header-section">
      <label>Select trip:</label>
      <select class="trip-selector" [(ngModel)]="tripId" (change)="loadBudget()">
        <option value="trip_test_01">Exploring Ella</option>
        <option value="trip_test_02">Trip to Nuwara Eliya</option>
      </select>
    </div>

    <div class="content-grid">
      <div class="card table-card">
        <div class="card-header-blue">
          <h3>Expenses for <span style="color: #00ACC1;">{{ tripId }}</span></h3>
        </div>

        <div class="table-container">
          <div *ngIf="expenses.length > 0">
            <table class="custom-table">
              <thead>
                <tr class="table-header-row">
                  <th>Category</th>
                  <th>Amount</th>
                  <th>Date</th>
                  <th>Note</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of expenses">
                  <td>
                    <span class="category-pill">
                      {{ item.category }}
                    </span>
                  </td>

                  <td style="font-weight: bold;">{{ (item.amount) | number:'1.2-2' }}</td>
                  <td>{{ (item.date) | date:'MMM d, y' }}</td>
                  <td style="color: #555;">{{ item.name }}</td>
                  <td>
                    <button class="btn-edit" (click)="editExpense(item)">✏️</button>
                    <button class="btn-delete" (click)="deleteExpense(item)">🗑️</button>
                  </td>
                </tr>
                <tr class="total-row" *ngIf="budget">
                  <td>Total</td>
                  <td style="font-size: 1.1rem;">{{ budget?.totalSpent | number:'1.2-2' }}</td>
                  <td colspan="3"></td>
                </tr>
              </tbody>
            </table>
          </div>

          <div *ngIf="expenses.length === 0" class="empty-state">
            <div class="empty-icon">🚀</div>
            <h3>Start Your Journey!</h3>
            <p>No expenses yet.</p>
          </div>

          <div class="add-btn-wrapper">
            <a [routerLink]="['/add-expense']" [queryParams]="{ tripId: tripId }" class="btn-add-teal">+ Add New Expense</a>
          </div>
        </div>
      </div>

      <div class="card chart-card">
        <div class="card-header-white"><h3>Summary</h3></div>
        <div class="chart-content-wrapper">
          <div class="chart-container" *ngIf="expenses.length > 0">
            <canvas baseChart [data]="doughnutChartData" [type]="doughnutChartType" [options]="chartOptions"></canvas>
          </div>

          <div class="custom-legend" *ngIf="expenses.length > 0">
            <div *ngFor="let label of doughnutChartLabels" class="legend-item">
              <span class="color-dot" [style.background-color]="getColorForCategory(label)"></span>
              <span class="legend-label">{{ label }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
