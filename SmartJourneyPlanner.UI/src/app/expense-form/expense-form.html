<div class="page-overlay form-background">
  <div class="form-card fade-in">

    <div class="form-header">
      <h2> {{ isEditMode ? 'Edit Expense' : 'Add New Expense' }}</h2>
      <p class="text-muted">Adding to your currently selected trip</p>
    </div>

    <form (ngSubmit)="onSubmit()">

      <label class="section-label">Select Category</label>
      <div class="category-grid">
        <div *ngFor="let cat of categories"
             class="cat-item"
             [class.active]="expense.category === cat.name"
             (click)="selectCategory(cat.name)">
          <span class="cat-icon">{{ cat.icon }}</span>
          <span class="cat-name">{{ cat.name }}</span>
        </div>
      </div>

      <div class="input-group">
        <label>What did you spend on?</label>
        <input type="text" 
               [(ngModel)]="expense.description" 
               name="description" 
               placeholder="e.g. Morning Coffee" 
               autocomplete="off" 
               required>
        
        <div *ngIf="expense.description && !isNoteValid(expense.description)" 
             style="color: #ff6b6b; font-size: 0.85rem; margin-top: 5px; font-weight: 500;">
          ⚠ Please enter a valid description (must contain letters).
        </div>
      </div>

      <div class="input-group">
        <label>Amount (LKR)</label>
        <input type="number" [(ngModel)]="expense.amount" name="amount" placeholder="0.00" required>
      </div>

      <div class="buttons">
        <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
        
        <button type="submit" 
                class="btn-save" 
                [disabled]="expense.description && !isNoteValid(expense.description)">
          {{ isEditMode ? '💾 Update Expense' : '✅ Save Expense' }}
        </button>
      </div>

    </form>
  </div>
</div>
