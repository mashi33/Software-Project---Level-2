<div class="tp-container">
  <div class="tp-header">
    <div class="container d-flex justify-content-between align-items-center">
      <div>
        <h1 class="text-light fw-bold fs-2"><i class="bi bi-car-front-fill me-2 text-info"></i> Provider Portal</h1>
        <p class="text-muted fs-6 mb-0">Manage your transport fleet and view incoming bookings.</p>
      </div>
    </div>
  </div>

  <div class="tp-nav">
    <div class="container d-flex gap-4">
      <button class="tp-nav-btn" [class.active]="activeTab === 'register'" (click)="activeTab = 'register'">
        <i class="bi bi-plus-circle me-2"></i> Register Vehicle
      </button>
      <button class="tp-nav-btn" [class.active]="activeTab === 'requests'" (click)="activeTab = 'requests'">
        <i class="bi bi-inbox-fill me-2"></i> Received Requests
      </button>
    </div>
  </div>

  <div class="container py-4">
    <!-- Tab Contents -->
    <div *ngIf="activeTab === 'register'" class="fade-in">
      <app-provider-form></app-provider-form>
    </div>


    <div *ngIf="activeTab === 'requests'" class="fade-in">
      <app-my-bookings [role]="'provider'"></app-my-bookings>
    </div>
  </div>
</div>
