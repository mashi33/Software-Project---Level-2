<div class="tp-container">
    <header class="tp-header text-center">
        <!-- Hero Title -->
        <div class="hero-text mb-4">
            <h1 class="display-4 fw-bold mb-3">Find Your Perfect Ride</h1>
            <p class="text-muted fs-5 mx-auto" style="max-width: 600px;">Explore Sri Lanka with trusted drivers and quality vehicles</p>
        </div>

        <!-- Segmented Control Switcher -->
        <div class="tp-switcher-container">
            <div class="tp-switcher">
                <div class="tp-switcher-glider" [class.glider-bookings]="activeTab === 'bookings'"></div>
                <button class="tp-switcher-btn" [class.active]="activeTab === 'search'" (click)="activeTab = 'search'">
                    Find Transport
                </button>
                <button class="tp-switcher-btn" [class.active]="activeTab === 'bookings'" (click)="activeTab = 'bookings'">
                    My Bookings
                </button>
            </div>
        </div>
    </header>

    <div class="tp-content-area">
        <app-user-search *ngIf="activeTab === 'search'"></app-user-search>
        <app-my-bookings *ngIf="activeTab === 'bookings'" [role]="'user'"></app-my-bookings>
    </div>
</div>
