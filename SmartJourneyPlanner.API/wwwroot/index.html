<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Journey Planner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0066ff;
            --success: #28a745;
            --bg: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 25px;
            margin: 30px 0;
        }

        .stat-card p {
            margin: 5px 0 0;
            font-size: 26px;
            font-weight: 800;
        }

        .day-marker {
            background: var(--success);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
            z-index: 2;
        }

        .timeline-line {
            border-left: 3px solid var(--success);
            margin-left: 21px;
            padding: 0 0 30px 35px;
        }

        .activity-card {
            background: white;
            border: 1px solid #eef0f2;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
            position: relative;
            transition: 0.3s;
        }

        .category-tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
            position: absolute;
            right: 100px;
            top: 20px;
        }

        .actions {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
        }

            .modal-content input, .modal-content select, .modal-content textarea {
                width: 100%;
                padding: 10px;
                margin: 8px 0;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
            }

        .toast {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            align-items: center;
            gap: 10px;
            border-left: 5px solid var(--success);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2><i class="fas fa-map-marker-alt" style="color:red"></i> Sri Lanka Journey</h2>
            <p style="color:#666">Track your daily activities and travel plans</p>
        </div>

        <div class="dashboard">
            <div class="stat-card"><h4>Total Days</h4><p>3</p></div>
            <div class="stat-card"><h4>Remaining</h4><p id="total-count">0</p></div>
            <div class="stat-card"><h4>Completed</h4><p id="comp-count">0/0</p></div>
        </div>

        <div class="day-marker">Day 1</div>
        <div class="timeline-line" id="timeline-root"></div>

        <button onclick="openModalForAdd()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:16px;">+ Add Activity</button>
    </div>

    <div class="modal" id="eventModal">
        <div class="modal-content">
            <h3 id="modal-title">Add Activity</h3>
            <input type="text" id="m-title" placeholder="Activity Title *">
            <div style="display:flex; gap:10px;">
                <select id="m-type">
                    <option>Accommodation</option>
                    <option>Dining</option>
                    <option>Sightseeing</option>
                </select>
                <input type="time" id="m-time">
            </div>
            <input type="text" id="m-loc" placeholder="Location *">
            <textarea id="m-desc" placeholder="Description"></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; border:1px solid #ddd; background:none; cursor:pointer;">Cancel</button>
                <button onclick="saveEvent()" id="btn-save" style="flex:1; padding:10px; background:black; color:white; border:none; cursor:pointer;">Add Activity</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle" style="color:green"></i> <span id="toast-text">Activity added!</span>
    </div>

    <script>
        let editingId = null;

        async function loadData() {
            const res = await fetch('/api/Trip');
            const data = await res.json();
            const root = document.getElementById('timeline-root');
            root.innerHTML = '';

            document.getElementById('total-count').innerText = data.length;
            const comp = data.filter(i => i.isCompleted).length;
            document.getElementById('comp-count').innerText = `${comp}/${data.length}`;

            data.forEach(item => {
                const id = item.id || item.Id;
                const icon = item.category === 'Dining' ? 'fa-utensils' :
                    item.category === 'Accommodation' ? 'fa-hotel' : 'fa-camera';

                const card = document.createElement('div');
                card.className = 'activity-card';
                card.innerHTML = `
                    <div style="font-size:22px; color:var(--primary)"><i class="fas ${icon}"></i></div>
                    <div style="flex:1">
                        <span class="category-tag">${item.category}</span>
                        <h3 style="margin:0">${item.activityName}</h3>
                        <div style="color:#777; font-size:13px; margin-top:5px;">
                            <i class="far fa-clock"></i> ${item.activityTime} &nbsp;
                            <i class="fas fa-map-pin"></i> ${item.location}
                        </div>
                        <p style="color:#888; font-size:13px; margin-top:8px;">${item.description}</p>
                    </div>
                    <div class="actions">
                        <input type="checkbox" ${item.isCompleted ? 'checked' : ''} onclick="toggleDone('${id}')">
                        <i class="fas fa-pencil-alt" style="color:var(--primary); cursor:pointer" onclick="openModalForEdit('${id}')"></i>
                        <i class="fas fa-trash" style="color:#ff4d4d; cursor:pointer" onclick="deleteItem('${id}')"></i>
                    </div>
                `;
                root.appendChild(card);
            });
        }

        function openModalForAdd() {
            editingId = null;
            document.getElementById('modal-title').innerText = "Add Activity";
            document.getElementById('btn-save').innerText = "Add Activity";
            resetForm();
            document.getElementById('eventModal').style.display = 'flex';
        }

        async function openModalForEdit(id) {
            editingId = id;
            document.getElementById('modal-title').innerText = "Update Activity";
            document.getElementById('btn-save').innerText = "Update Activity";

            const res = await fetch('/api/Trip');
            const data = await res.json();
            const item = data.find(i => (i.id || i.Id) === id);

            if (item) {
                document.getElementById('m-title').value = item.activityName;
                document.getElementById('m-type').value = item.category;
                document.getElementById('m-time').value = item.activityTime;
                document.getElementById('m-loc').value = item.location;
                document.getElementById('m-desc').value = item.description;
                document.getElementById('eventModal').style.display = 'flex';
            }
        }

        async function saveEvent() {
            const payload = {
                activityName: document.getElementById('m-title').value,
                activityTime: document.getElementById('m-time').value,
                location: document.getElementById('m-loc').value,
                description: document.getElementById('m-desc').value,
                category: document.getElementById('m-type').value,
                isCompleted: false
            };

            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? `/api/Trip/${editingId}` : '/api/Trip';

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                closeModal();
                loadData();
                showToast(editingId ? "Activity updated!" : "Activity added!");
            }
        }

        function showToast(msg) {
            document.getElementById('toast-text').innerText = msg;
            const t = document.getElementById('toast');
            t.style.display = 'flex';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function closeModal() { document.getElementById('eventModal').style.display = 'none'; }
        function resetForm() { document.getElementById('m-title').value = ''; document.getElementById('m-loc').value = ''; document.getElementById('m-desc').value = ''; }
        async function toggleDone(id) { await fetch(`/api/Trip/${id}/complete`, { method: 'PUT' }); loadData(); }
        async function deleteItem(id) { if (confirm("Remove this activity?")) { await fetch(`/api/Trip/${id}`, { method: 'DELETE' }); loadData(); } }

        loadData();
    </script>
</body>
</html>
