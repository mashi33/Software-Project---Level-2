<div class="page-container">
  
  <div class="trip-card">
   <div class="text-center mb-4">
    <h1 class="display-5 fw-bold text-dark mb-2">Plan Your Next Adventure</h1>
    
    <p class="text-muted fs-5">Fill in the details and let the magic begin. Your dream vacation is just a few clicks away.</p>
    
    <div class="mx-auto bg-primary opacity-50" style="width: 50px; height: 3px; border-radius: 2px;"></div>
   </div>
    
   <!-- Form starts here -->
   <form [formGroup]="tripForm" (ngSubmit)="onSubmit()">
      
      <div class="form-container">

        <div class="left-form">
           
             <input type="text" formControlName="tripName" placeholder="Trip name" />

                     <div class="row">
                         <input type="text" formControlName="departFrom" placeholder="Depart from" />
                         <input type="text" formControlName="destination" placeholder="Destination" />
                     </div>

                    <div class="row">
                         <input type="date" formControlName="startDate" />
                         <input type="date" formControlName="endDate" />
                     </div>

                     <div class="budget-section">
                           <select class="form-select" formControlName="budgetLimit">
                           <option value="" disabled selected>Select budget limit</option>
                           <option value="5000-10000">5000 - 10000</option>
                           <option value="10000-20000">10000 - 20000</option>
                           <option value="20000-30000">20000 - 30000</option>
                           <option value="30000-40000">30000 - 40000</option>
                           <option value="above 50000">Above 50000</option>
                          </select>
                       </div>

                 <textarea formControlName="description" placeholder="Trip description..."></textarea>
        </div>
        
        <!-- Right side for member invitations -->
        <div class="members-box">
          <h3>Add Members</h3>
          <input type="email" formControlName="memberEmail" placeholder="Enter email" />
          <select formControlName="memberRole">
            <option value="Editor">Editor</option>
            <option value="Viewer">Viewer</option>
          </select>
          <button type="button" class="invite-btn" (click)="onInvite()">Invite</button>
        </div>

      </div> <!-- form-container CLOSE -->
      
      <!-- Invited Members Section -->
      <div *ngIf="invitedMembers.length > 0" class="invited-members-section mt-4">
        <h4 class="fw-bold mb-3">Invited Members</h4>
    
       <div class="d-flex flex-wrap gap-2">
         <div *ngFor="let m of invitedMembers; let i = index" class="member-chip">
            <i class="bi bi-person-fill me-2 text-primary"></i>
            
            <span class="member-text">
                {{ m.email }} <span class="badge-role">{{ m.role }}</span>
            </span>

            <span class="remove-btn" (click)="removeMember(i)" title="Remove member">
                <i class="bi bi-x"></i>
            </span>
          </div>
        </div>
      </div>

      <div class="bottom-buttons">
        <button type="button" class="cancel-btn">Cancel</button>
        <button type="submit" class="submit-btn">Submit</button>
      </div>

    </form>

  </div> <!-- trip-card CLOSE -->

</div> <!-- page-container CLOSE -->
